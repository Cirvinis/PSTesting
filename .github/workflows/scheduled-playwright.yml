name: Scheduled Playwright Suite

on:
  schedule:
    # Runs daily at 14:32 GMT+2 (12:32 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  scheduled-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate execution proof metadata (before tests)
        run: |
          mkdir -p scheduler-proof
          cat <<EOF > scheduler-proof/scheduler-proof.json
          {
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow": "${{ github.workflow }}",
            "event": "${{ github.event_name }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "repository": "${{ github.repository }}",
            "sha": "${{ github.sha }}"
          }
          EOF

      - name: Run scheduled suite
        run: |
          npx playwright test tests/2_2.spec.js tests/3_1.spec.js tests/3_2.spec.js

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Upload scheduler proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-proof
          path: scheduler-proof/scheduler-proof.json
          if-no-files-found: error
